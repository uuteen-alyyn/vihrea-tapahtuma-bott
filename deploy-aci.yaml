apiVersion: 2021-10-01
location: swedencentral
name: tapahtumabot
properties:
  containers:
    - name: bot
      properties:
        image: ghcr.io/uuteen-alyyn/vihrea-tapahtuma-bott
        resources:
          requests:
            cpu: 0.5
            memoryInGb: 0.5
        environmentVariables:
          - name: DISCORD_BOT_TOKEN
            secureValue: "<your-discord-token>"
          - name: ENCRYPTION_KEY
            secureValue: "<your-encryption-key>"
          - name: DATABASE_URL
            secureValue: "mysql+pymysql://<user>:<pass>@<host>/<dbname>?charset=utf8mb4"
          - name: API_BASE_URL
            value: "https://tapahtumat.vihreaturku.fi"
  subnetIds:
    - id: /subscriptions/c9700cd7-d401-4254-80fe-02e15c6abe3f/resourceGroups/Vihrea-tapahtumakalenteri/providers/Microsoft.Network/virtualNetworks/koijarvi-vnet/subnets/discord-bot
  osType: Linux
  restartPolicy: Always
type: Microsoft.ContainerInstance/containerGroups
